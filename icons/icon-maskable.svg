<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b3d2e"/>
      <stop offset="100%" stop-color="#1a6b4a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ade80"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>
  </defs>
  <!-- Fondo completo para maskable (sin border-radius) -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <!-- Contenido centrado en safe zone (80% del centro) -->
  <text x="256" y="220" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="100" font-weight="900" fill="url(#accent)">AI</text>
  <text x="256" y="330" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="50" font-weight="600" fill="#e9fbe5" letter-spacing="6">ENGLISH</text>
</svg>
