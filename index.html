<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FluentIA — Aprende inglés con IA</title>
  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#2884f4" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FluentIA" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css?v=9" />
</head>
<body>

  <!-- ANIMATED BACKGROUND -->
  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <!-- HEADER -->
  <header>
    <div class="logo">
      <img class="logo-icon" src="icons/logo-header.png" alt="FluentIA" />
      <span class="logo-text">FluentIA</span>
      <span class="logo-badge">Beta</span>
    </div>

    <nav>
      <button class="nav-btn active" data-tab="traductor">
        <span class="nav-icon">🎤</span> Traductor en Vivo
      </button>
      <button class="nav-btn" data-tab="level">
        <span class="nav-icon">📊</span> Level
      </button>
      <button class="nav-btn" data-tab="chat">
        <span class="nav-icon">💬</span> Chat IA
      </button>
    </nav>

  </header>

  <!-- MAIN -->
  <main>

    <!-- ===== LEVEL TEST ===== -->
    <section id="tab-level" class="tab hidden">
      <div class="level-wrap">
        <div class="level-header">
          <h1>Tu Nivel de Inglés</h1>
          <p class="subtitle">Responde 4 preguntas para conocer tu nivel</p>
        </div>

        <!-- Badge de nivel actual -->
        <div class="level-badge-area" id="level-badge-area">
          <div class="level-badge" id="level-badge">?</div>
          <div class="level-label" id="level-label">Sin evaluar</div>
          <p class="level-desc" id="level-desc">Haz el test para que George adapte las lecciones a tu nivel.</p>
        </div>

        <!-- Progreso del test -->
        <div class="level-progress" id="level-progress" style="display:none;">
          <div class="level-progress-bar">
            <div class="level-progress-fill" id="level-progress-fill" style="width:0%"></div>
          </div>
          <span class="level-progress-text" id="level-progress-text">Pregunta 1 de 4</span>
        </div>

        <!-- Área de conversación del test -->
        <div class="level-chat" id="level-chat" style="display:none;">
          <div class="level-messages" id="level-messages"></div>
          <div class="level-input-area">
            <input type="text" id="level-input" placeholder="Escribe tu respuesta..." autocomplete="off" />
            <button id="level-send-btn" class="send-btn" title="Enviar">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
        </div>

        <!-- Botones de acción -->
        <div class="level-actions">
          <button class="btn-primary" id="start-level-btn">Comenzar Test</button>
          <button class="btn-ghost" id="reset-level-btn" style="display:none;">Repetir Test</button>
        </div>
      </div>
    </section>

    <!-- ===== CHAT ===== -->
    <section id="tab-chat" class="tab hidden">
      <div class="wa-chat-wrap">

        <!-- WhatsApp Header -->
        <div class="wa-header">
          <div class="wa-avatar-wrap" id="aria-svg">
            <video id="aria-video" src="Fondo.mp4" playsinline muted loop autoplay preload="auto"></video>
            <div class="tutor-online-dot"></div>
          </div>
          <div class="wa-header-info">
            <div class="wa-header-name">George</div>
            <div class="wa-header-status" id="tutor-status"><span class="status-dot"></span> en línea · Tutor de Inglés IA</div>
          </div>
          <button id="tts-toggle-btn" class="tts-btn">🔊 Voz</button>
        </div>

        <!-- Cuerpo del chat con video de fondo -->
        <div class="wa-body" id="wa-body">
          <div class="wa-bg-video">
            <video id="chat-bg-video" src="Fondo.mp4" playsinline muted loop autoplay preload="auto"></video>
            <div class="wa-bg-overlay"></div>
          </div>
          <div class="chat-container" id="chat-container">
          </div>
        </div>

        <!-- Input area estilo WhatsApp -->
        <div class="wa-input-area">
          <div class="chat-input-row">
            <button id="mic-btn" class="mic-btn" title="Hablar con George">
              <svg id="mic-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
              </svg>
            </button>
            <input type="text" id="chat-input" placeholder="Escribe un mensaje..." autocomplete="off" />
            <button id="send-btn" class="send-btn" title="Enviar">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
            </button>
          </div>
          <div class="suggestions">
            <button class="chip">Dame una lección</button>
            <button class="chip">Corrige: I go to school yesterday</button>
            <button class="chip">¿Cómo se dice "sin embargo"?</button>
            <button class="chip">Phrasal verbs comunes</button>
          </div>
        </div>

      </div><!-- /wa-chat-wrap -->
    </section>

    <!-- ===== TRADUCTOR ===== -->
    <section id="tab-traductor" class="tab active">
      <div class="tr-wrap">

        <!-- Header estilo WhatsApp -->
        <div class="tr-wa-header">
          <div class="tr-wa-icon">🎤</div>
          <div class="tr-wa-info">
            <div class="tr-wa-name">Traductor en Vivo</div>
            <div class="tr-wa-sub" id="tr-status">Selecciona idioma y presiona el micrófono</div>
          </div>
          <select id="tr-lang-select" class="tr-lang-select">
            <option value="en-US">🇺🇸 Inglés</option>
            <option value="fr-FR">🇫🇷 Francés</option>
            <option value="de-DE">🇩🇪 Alemán</option>
            <option value="pt-BR">🇧🇷 Portugués</option>
            <option value="it-IT">🇮🇹 Italiano</option>
            <option value="zh-CN">🇨🇳 Chino</option>
            <option value="ja-JP">🇯🇵 Japonés</option>
            <option value="ko-KR">🇰🇷 Coreano</option>
            <option value="ar-SA">🇸🇦 Árabe</option>
            <option value="ru-RU">🇷🇺 Ruso</option>
            <option value="hi-IN">🇮🇳 Hindi</option>
            <option value="nl-NL">🇳🇱 Holandés</option>
            <option value="th-TH">🇹🇭 Tailandés</option>
            <option value="tr-TR">🇹🇷 Turco</option>
          </select>
        </div>

        <!-- Barra de dirección -->
        <div class="tr-dir-bar">
          <button id="tr-dir-btn" class="tr-dir-btn active" data-mode="to-es">
            <span class="tr-dir-flag" id="tr-dir-from">🌍</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="5" y1="12" x2="19" y2="12"/><polyline points="12 5 19 12 12 19"/></svg>
            <span class="tr-dir-flag">🇪🇸</span>
            <span class="tr-dir-label" id="tr-dir-label">Traducir al Español</span>
          </button>
          <button id="tr-swap-btn" class="tr-swap-btn" title="Cambiar dirección">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M7 16V4m0 0L3 8m4-4l4 4"/><path d="M17 8v12m0 0l4-4m-4 4l-4-4"/></svg>
          </button>
        </div>

        <!-- Cuerpo del chat -->
        <div class="tr-body" id="tr-body">
          <div class="tr-messages" id="tr-log"></div>
        </div>

        <!-- Área inferior -->
        <div class="tr-bottom">
          <!-- Texto en tiempo real -->
          <div id="tr-interim-wrap" class="tr-interim-wrap hidden">
            <span id="tr-interim" class="tr-interim"></span>
          </div>
          <!-- Controles -->
          <div class="tr-controls">
            <button id="tr-clear-btn" class="tr-clear-btn" title="Limpiar">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/></svg>
            </button>
            <button id="tr-mic-btn" class="tr-mic-btn" title="Iniciar traducción">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/>
                <path d="M19 10v2a7 7 0 0 1-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
              </svg>
              <div class="tr-mic-rings">
                <div class="tr-ring tr-ring-1"></div>
                <div class="tr-ring tr-ring-2"></div>
              </div>
            </button>
            <button id="tr-cam-btn" class="tr-cam-btn" title="Traducir imagen">
              <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                <circle cx="12" cy="13" r="4"/>
              </svg>
            </button>
            <!-- Input oculto para cámara/galería -->
            <input type="file" id="tr-img-input" accept="image/*" capture="environment" style="display:none" />
          </div>
        </div>

      </div>
    </section>

  </main>

  <script src="app.js?v=8"></script>
  <script>
    // Registrar Service Worker para PWA
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }
  </script>
</body>
</html>
